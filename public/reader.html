<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novi - Reader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #000;">
    
    <main id="readerMain" style="display: flex; flex-direction: column; align-items: center; padding-top: 2rem; padding-bottom: 100px; width: 100%;">
        <div class="system-msg" style="color: var(--accent); margin-top: 5rem;">Extracting image payloads...</div>
    </main>

    <div id="bottomNav" style="position: fixed; bottom: 0; left: 0; width: 100%; padding: 1rem 2rem; background: rgba(18,18,18,0.95); backdrop-filter: blur(10px); z-index: 100; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <button id="prevBtn" style="background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; opacity: 0.5; pointer-events: none;">← Prev</button>
        <button id="allBtn" onclick="history.back()" style="background: transparent; color: var(--text-muted); border: none; cursor: pointer; font-weight: bold;">All Chapters</button>
        <button id="nextBtn" style="background: var(--accent); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; opacity: 0.5; pointer-events: none;">Next →</button>
    </div>

    <script src="reader.js"></script>
</body>
</html>
